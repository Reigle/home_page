<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reigle株式会社</title>
    <link rel="stylesheet" href="/styles/index.css" />
    <link rel="icon" type="image/x-icon" href="/img/favicon.ico" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

    <script src="/component/header.js"></script>
    <link rel="stylesheet" href="/component/header.css" />
    <script src="/component/footer.js"></script>
    <script src="/news/someNews.js"></script>
  </head>
  <body>
    <div class="header header_area"></div>

    <div>
      <div class="main-visual">
        <span class="main-visual-catch">
          <span>Length from 0 to GOAL</span>
        </span>
      </div>
      <div class="main-contents-area">
        <div id="about" class="main-content">
          <span class="font-weight-bold contents-title">Mission</span>
          <span class="contents-sub-title">企業理念・ミッション</span>
          
          <div class="main-content-text index-about-text">
            <span class="nowrap mission_title">
              最初【0】から、最後【GOAL】までの長い間【Length】<br />
              「一緒に仕事がしたい」と思って頂けるような会社を目指しています。
            </span><br /><br />

            <span class="nowrap mission_sub_title">企業理念を実現するためのミッション</span><br />
            <div class="mission_detail_area">
              <div class="nowrap mission_detail">
                1. 給料の計算方法などを開示して、透明性を高め、<br />
                &nbsp;&nbsp;&nbsp;&nbsp;優秀なエンジニアに入社して頂ける環境を作る。</div>
              <div class="nowrap mission_detail">2. エンジニアの成果に対して最大限の給料還元を行う。</div>
              <div class="nowrap mission_detail">3. 取引企業様に優秀なエンジニアをご提案する。</div>
            </div>
          </div>
        </div>
        <div id="news" class="main-content">
          <span class="font-weight-bold contents-title">News</span>
          <span class="contents-sub-title">ニュース</span>
          <div class="news"></div>
        </div>
      </div>
    </div>

    <div class="footer"></div>
  </body>
</html>
